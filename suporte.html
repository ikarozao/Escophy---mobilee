</head>
<body>
    <h1>Precisa de ajuda?</h1>

<input type="text" id="mensagem" placeholder="Relate seu problema aqui">

<button id="enviarEmail">Envie um email!</button>
</body>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>

const supabaseUrl = 'https://yuupbtrljazrrwizzafd.supabase.co';
const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1dXBidHJsamF6cnJ3aXp6YWZkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjA5MjIzMzMsImV4cCI6MjA3NjQ5ODMzM30.trZvyDgPnhenuPiKxChZbVLcBQI3rOm8OsjtgAzoAm0';
const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

emailjs.init("MQCRH_zme-EKH_OA_");

const botao = document.getElementById("enviarEmail");

botao.addEventListener("click", async () => {

    const mensagem = document.getElementById("mensagem").value;

    const { data } = await supabaseClient.auth.getUser();

        if (!data.user) {
    alert("Você precisa estar logado para enviar suporte.");
    return;
    }

const emailUsuario = data.user.email;

    const templateParams = {
        subject: "Ajuda no Escorphy",
        message: mensagem,
        user_email: emailUsuario
    };

    emailjs.send("service_zy04i9c", "template_n11sxy6", templateParams)
        .then(() => {
            alert("Email enviado com sucesso!");
        })
        .catch((error) => {
            console.error(error);
            alert("Erro ao enviar email");
        });

});

</script>
