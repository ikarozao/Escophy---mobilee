<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="suporte/suporte.css">
</head>
<body>
    <h1>Precisa de ajuda?</h1>

<input type="text" id="mensagem" placeholder="Relate seu problema aqui">

<button id="enviarEmail">Envie um email!</button>
</body>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
    
emailjs.init("MQCRH_zme-EKH_OA_");

const botao = document.getElementById("enviarEmail");

botao.addEventListener("click", () => {

    const mensagem = document.getElementById("mensagem").value;

    const user = supabase.auth.getUser(); // usuário logado

    const templateParams = {
        subject: "Ajuda no Escorphy",
        message: mensagem,
        user_email: user.email
    };

    emailjs.send("service_zy04i9c", "template_n11sxy6", templateParams)
        .then(() => {
            alert("Email enviado com sucesso!");
        })
        .catch((error) => {
            console.error(error);
            alert("Erro ao enviar email");
        });

});
</script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>                
</html>
