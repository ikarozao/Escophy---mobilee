<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Login - Escorphy</title>
  <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" type="image/png" href="img/a.png" />
</head>

<body>

  <div class="background-carousel">
    <img class="bg-img active" src="img/edit 10.jpg" alt="Imagem 1" />
    <img class="bg-img" src="img/edit 8.jpg" alt="Imagem 2" />
    <img class="bg-img" src="img/edit 9.jpg" alt="Imagem 3" />
    <img class="bg-img" src="img/edit 2.jpg" alt="Imagem 4" />
    <img class="bg-img" src="img/edit 4.jpg" alt="Imagem 2" />
  </div>

  <main class="container">
    <!-- formulário de Login -->
    <form id="login-form" class="form active">
      <h1>Login</h1>
      <div class="input-box">
        <input id="email-login" placeholder="Email" type="email" required />
        <i class="bx bx-user"></i>
      </div>
      <div class="input-box">
        <input id="senha-login" placeholder="Senha" type="password" required />
        <i class="bx bx-show toggle-password" data-target="senha-login"></i>
      </div>

      <button class="login" type="submit">Login</button>

      <div class="register-link">
        <p>Não tem uma conta? <a href="#" id="show-register">Cadastre-se</a></p>
      </div>
    </form>

    <!-- formulário de Cadastro -->
    <form id="register-form" class="form">
      <h1>Cadastro</h1>
      <div class="input-box">
        <input id="nome-cadastro" placeholder="Nome" type="text" required />
        <i class="bx bx-user"></i>
      </div>
      <div class="input-box">
        <input id="email-cadastro" placeholder="Email" type="email" required />
        <i class="bx bx-envelope"></i>
      </div>
      <div class="input-box">
        <input id="senha-cadastro" placeholder="Senha" type="password" required />
        <i class="bx bx-show toggle-password" data-target="senha-cadastro"></i>
      </div>

      <button class="login" type="submit">Cadastrar</button>

      <div class="register-link">
        <p>Já tem uma conta? <a href="#" id="show-login">Login</a></p>
      </div>
    </form>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.8/dist/umd/supabase.min.js"></script>

  <script>
    // =========================
    // Carrossel
    // =========================
    const images = document.querySelectorAll(".bg-img");
    let current = 0;

    setInterval(() => {
      images[current].classList.remove("active");
      current = (current + 1) % images.length;
      images[current].classList.add("active");
    }, 8000);

    // =========================
    // Alternar forms
    // =========================
    const loginForm = document.getElementById("login-form");
    const registerForm = document.getElementById("register-form");
    const showRegister = document.getElementById("show-register");
    const showLogin = document.getElementById("show-login");

    showRegister?.addEventListener("click", (e) => {
      e.preventDefault();
      loginForm.classList.remove("active");
      registerForm.classList.add("active");
    });

    showLogin?.addEventListener("click", (e) => {
      e.preventDefault();
      registerForm.classList.remove("active");
      loginForm.classList.add("active");
    });

    // =========================
    // Supabase
    // =========================
    const SUPABASE_URL = "https://yuupbtrljazrrwizzafd.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_wHu7RW-F1J8ralIQoIbTyA_H6fldLYG";

    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY
    );

    // =========================
    // LOGIN
    // =========================
    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const email = document.getElementById("email-login").value;
      const senha = document.getElementById("senha-login").value;

      try {
        const { data, error } =
          await supabaseClient.auth.signInWithPassword({
            email,
            password: senha,
          });

        if (error) {
          console.error(error);
          alert("Email ou senha incorretos!");
          return;
        }

        // pega nome da tabela usuarios
        const { data: usuario } = await supabaseClient
          .from("usuarios")
          .select("nome")
          .eq("id", data.user.id)
          .single();

        localStorage.setItem("usuarioId", data.user.id);
        localStorage.setItem("usuarioEmail", data.user.email);

        if (usuario?.nome) {
          localStorage.setItem("usuarioLogado", usuario.nome);
        }

        console.log("✅ Login OK");
        window.location.href = "home.html";

      } catch (err) {
        console.error(err);
        alert("Erro ao fazer login!");
      }
    });

    // =========================
    // CADASTRO
    // =========================
    registerForm.addEventListener("submit", async (e) => {
      e.preventDefault();

      const nome = document.getElementById("nome-cadastro").value;
      const email = document.getElementById("email-cadastro").value;
      const senha = document.getElementById("senha-cadastro").value;

      try {
        // cria conta no Auth
        const { data, error } = await supabaseClient.auth.signUp({
          email,
          password: senha,
        });

        if (error) {
          console.error(error);
          alert(error.message);
          return;
        }

        const user = data.user;

        // salva infos extras
        const { error: insertError } = await supabaseClient
          .from("usuarios")
          .insert([
            {
              id: user.id,
              nome: nome,
              email: email,
              created_at: new Date().toISOString(),
            },
          ]);

        if (insertError) {
          console.error(insertError);
          alert("Erro ao salvar usuário.");
          return;
        }

        localStorage.setItem("usuarioId", user.id);
        localStorage.setItem("usuarioEmail", user.email);
        localStorage.setItem("usuarioLogado", nome);

        alert("✅ Cadastro realizado com sucesso!");
        window.location.href = "home.html";

      } catch (err) {
        console.error(err);
        alert("Erro ao cadastrar!");
      }
    });

    // =========================
    // Mostrar senha
    // =========================
    document.querySelectorAll(".toggle-password").forEach((icon) => {
      icon.addEventListener("click", () => {
        const inputId = icon.getAttribute("data-target");
        const input = document.getElementById(inputId);

        if (input.type === "password") {
          input.type = "text";
          icon.classList.replace("bx-show", "bx-hide");
        } else {
          input.type = "password";
          icon.classList.replace("bx-hide", "bx-show");
        }
      });
    });
  </script>

</body>

</html>
